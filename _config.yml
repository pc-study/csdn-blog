# Hexo Configuration
# Docs: https://hexo.io/docs/configuration.html

# Site
title: "Lucifer三思而后行"
subtitle: "CSDN 博客备份归档"
description: "528 篇原创技术文章 | Oracle · 数据库 · Linux · 运维"
keywords:
  - Oracle
  - 数据库
  - Linux
  - 运维
  - DBA
author: Lucifer
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://pc-study.github.io/csdn-blog
root: /csdn-blog/
permalink: posts/:abbrlink/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: true
  tab_replace: '  '
  wrap: true
  hljs: true
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 12
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 12
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: butterfly

# Deployment
deploy:
  type: git
  repo: https://github.com/pc-study/csdn-blog.git
  branch: gh-pages

# Search
search:
  path: search.xml
  field: post
  content: true
  format: html

# Word counter (reading time)
symbols_count_time:
  symbols: true
  time: true
  awl: 4
  wpm: 275
  suffix: "mins."

# Feed
feed:
  enable: true
  type: atom
  path: atom.xml
  limit: 100
  hub:
  content:
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

# Sitemap
sitemap:
  path: sitemap.xml
  rel: true
  tags: true
  categories: true
