          - heading " 前言" [level=2] [ref=e128]:
            - link "" [ref=e129] [cursor=pointer]:
              - /url: "#前言"
            - text: 前言
          - paragraph [ref=e130]:
            - text: 今天业务抛了个问题过来：
            - strong [ref=e131]: Oracle 能不能直接查 TiDB？
          - paragraph [ref=e132]:
            - text: 第一反应是 “这俩不是一套体系”，但转念一想，TiDB 在协议层面兼容 MySQL，而 Oracle 早就可以通过
            - strong [ref=e133]: 透明网关 + ODBC + DBLink
            - text: 访问 MySQL，那 TiDB 理论上也走得通。
          - paragraph [ref=e134]:
            - text: 实际动手验证了一下，结论很明确：
            - strong [ref=e135]: 确实可以
            - text: 。不需要做数据同步，不用引入中间服务，也不必改应用代码，
            - strong [ref=e136]: 只要在 Oracle 里建一个 DBLink
            - text: ，就能直接查询 TiDB 表。
          - paragraph [ref=e137]: 本文记录的就是这次完整的落地过程。
          - heading " 环境信息" [level=2] [ref=e138]:
            - link "" [ref=e139] [cursor=pointer]:
              - /url: "#环境信息"
            - text: 环境信息
          - paragraph [ref=e140]: 环境本身并不复杂，两端都是 CentOS 7.9，数据库版本也都算主流：
