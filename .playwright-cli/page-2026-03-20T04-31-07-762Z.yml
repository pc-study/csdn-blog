            - text: 前言
      - article [ref=e532]:
        - generic [ref=e533]:
          - heading "【金仓数据库产品体验官】KSQL Developer：一款值得推荐的数据库管理工具" [level=2] [ref=e534]:
            - link "【金仓数据库产品体验官】KSQL Developer：一款值得推荐的数据库管理工具" [ref=e535] [cursor=pointer]:
              - /url: /csdn-blog/posts/155349073/
          - generic [ref=e537]:
            - generic [ref=e538]:
