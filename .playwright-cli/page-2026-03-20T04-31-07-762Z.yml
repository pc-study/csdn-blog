        - generic [ref=e553]:
          - heading " 前言" [level=2] [ref=e554]:
            - link "" [ref=e555] [cursor=pointer]:
              - /url: "#前言"
            - text: 前言
          - paragraph [ref=e556]: 作为一名长期奋战在一线的 DBA，我深知数据库运维工作的复杂性与挑战性。随着国产数据库的快速发展，我们在享受技术自主可控带来的安全感的同时，也面临着多款数据库并存的运维压力。不同的数据库产品意味着需要掌握不同的管理工具，这无疑增加了我们的工作负担。
          - paragraph [ref=e557]: 最近，我在实际工作中接触到了金仓的 KSQL Developer 数据库管理工具，经过一段时间的使用，确实感受到了它的实用价值，今天就想和大家分享这款工具的使用体验。
          - heading " 安装 KSQL Developer" [level=2] [ref=e558]:
            - link "" [ref=e559] [cursor=pointer]:
              - /url: "#安装-KSQL-Developer"
            - text: 安装 KSQL Developer
          - paragraph [ref=e560]: KSQL Developer 的安装过程十分友好，真正做到了” 一键安装”。只需要解压安装包，双击运行 setup.bat 文件，然后按照安装向导的提示一步步操作即可。
          - paragraph [ref=e561]:
            - text: 解压后，双击运行
            - code [ref=e562]: setup.bat
            - text: 开始安装：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/f8d31bc3e34f228ed8f713ae39af4c89.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/658df128dbd2c1f6b269ce947a67eada.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/c0bccfe0571469f2a6f16d9b38796750.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/c4404b3d75c4bfc397472be465b5a4cc.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/7e1dd37796161dd7f91f1f158a07dcc2.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/abcac01cfc274e268d40080f3102287e.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/49835ff6c4095a9b603166945bb0d613.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/f89f27be0165edccae3d2dcbde30429e.png
              - img
          - paragraph [ref=e563]: 整个安装过程清晰直观，没有复杂的配置选项，从启动安装程序到完成安装，只需要连续点击” 下一步” 按钮，几分钟内就能完成所有安装步骤。这种简洁的安装体验对于我们 DBA 来说非常实用，特别是在需要快速部署工具的紧急情况下。
          - heading " 异构数据库支持" [level=2] [ref=e564]:
            - link "" [ref=e565] [cursor=pointer]:
              - /url: "#异构数据库支持"
            - text: 异构数据库支持
          - paragraph [ref=e566]: 在实际的运维环境中，我们往往需要同时管理多种类型的数据库。KSQL Developer 在这方面表现突出，它提供了对多种主流数据库的全面支持。
          - heading " Kingbase" [level=3] [ref=e567]:
            - link "" [ref=e568] [cursor=pointer]:
              - /url: "#Kingbase"
            - text: Kingbase
          - paragraph [ref=e569]: 对金仓数据库的自然支持当然不在话下，连接配置简单直观：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/cd0004f9869eb94b4d2e9e44937ec2b5.png
              - img
          - paragraph [ref=e570]: 只需要输入正确的主机 IP、端口号、用户名和密码，就能快速建立连接：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/140743b55c34a1be3c0a28ddddbf2939.png
              - img
          - paragraph [ref=e571]: 测试连接功能让我们在正式使用前能够验证配置的正确性，避免了因配置错误导致的连接问题：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/fb39a58c7fd1aaf7679c83e21e93b6bb.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/7c2e4084310f80b7f88ab3c12b54a193.png
              - img
          - heading " Oracle" [level=3] [ref=e572]:
            - link "" [ref=e573] [cursor=pointer]:
              - /url: "#Oracle"
            - text: Oracle
          - paragraph [ref=e574]: 对 Oracle 数据库的支持同样令人满意。在连接 Oracle 数据库时，KSQL Developer 提供了专门的配置选项，连接过程流畅，没有出现兼容性问题。
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/1c396cc7566a10478fb6ac0fd817f46d.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/61b5988aaf7ebb105d91c1fb26491a1f.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/c29f8dd13a9e09502757679ed26c519d.png
              - img
          - paragraph [ref=e575]: 这对于需要同时管理金仓和 Oracle 数据库的 DBA 来说，确实提高了工作效率。
          - heading " MySQL" [level=3] [ref=e576]:
            - link "" [ref=e577] [cursor=pointer]:
              - /url: "#MySQL"
            - text: MySQL
          - paragraph [ref=e578]: 连接 MySQL 数据库时可能会遇到一个小问题 —— 由于 MySQL 默认关闭公钥检索功能，需要在驱动设置的连接属性中手动添加 allowPublicKeyRetrieval = true 参数。
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/6dce3f57f390ba2a95ec3709ff64b9f5.png
              - img
          - paragraph [ref=e579]:
            - text: 这里遇到个问题，需要设置一下（
            - strong [ref=e580]: 因为允许公钥检索是默认关闭的，需要将它开启
            - text: ）：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/ff7fd09eb48857c072abfaaa4c07a098.png
              - img
          - paragraph [ref=e581]:
            - text: 在驱动设置 –> 连接属性设置，手动添加一个用户属性
            - code [ref=e582]: allowPublicKeyRetrieval=true
            - text: ：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/e9c373d2f550b19e306e1eb3255ba516.png
              - img
          - paragraph [ref=e583]: 再次测试连接即可：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/1acd4bf0230831561755294406018536.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/fa952dd208252d65635f1c3d559ce8a6.png
              - img
          - paragraph [ref=e584]: 这个问题的解决方案很直观，在工具界面中很容易找到相应的设置位置。一旦完成这个简单的配置，连接 MySQL 数据库就变得十分顺畅。
          - paragraph [ref=e585]: 这种对多种数据库的良好支持，使得我们可以在一个统一的界面中管理不同类型的数据库，大大减少了在不同管理工具之间切换的时间成本。
          - heading " 对象图形化管理" [level=2] [ref=e586]:
            - link "" [ref=e587] [cursor=pointer]:
              - /url: "#对象图形化管理"
            - text: 对象图形化管理
          - paragraph [ref=e588]: 即使是对 SQL 语法不太熟悉的初级 DBA，也能通过 KSQL Developer 的图形化界面轻松完成各种数据库对象的管理工作。
          - heading " 新建库" [level=3] [ref=e589]:
            - link "" [ref=e590] [cursor=pointer]:
              - /url: "#新建库"
            - text: 新建库
          - paragraph [ref=e591]: 创建数据库的过程完全可视化，通过填写数据库的基本参数就能快速完成，无需记忆复杂的 SQL 语句。
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/ec1d56b880ee1a369f34afd6cf3730d3.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/635afd37a91218b10c128fe118a91ccb.png
              - img
          - heading " 新建模式" [level=3] [ref=e592]:
            - link "" [ref=e593] [cursor=pointer]:
              - /url: "#新建模式"
            - text: 新建模式
          - paragraph [ref=e594]: 模式管理同样简单，图形化界面让我们能够直观地设置模式的各项属性。
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/3e08648e880037850d8d2a4d6c7ec667.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/9d0bd48e33281ad808a8e35b03b06583.png
              - img
          - paragraph [ref=e595]: 特别值得一提的是，工具还提供了 DDL 语句预览功能，这对于学习 SQL 语法或者验证操作的正确性都有很大帮助：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/3a024dd8c493ae7d564b005b10f27a31.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/3e4f767e7ea245bca190f262acd3ec49.png
              - img
          - heading " 建表" [level=3] [ref=e596]:
            - link "" [ref=e597] [cursor=pointer]:
              - /url: "#建表"
            - text: 建表
          - paragraph [ref=e598]: 数据表管理功能十分完善，从创建表结构到编辑表数据，都能通过直观的界面操作完成。
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/6d6d9883d1250a812e11f51aa0a21ce8.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/a2060ca0a5b35c050fd5eb9921fbcf0c.png
              - img
          - paragraph [ref=e599]: 在表格数据编辑方面，工具提供了类似 Excel 的编辑体验，支持直接在中修改数据：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/f03167df971669d1b0849a62135657ee.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/0156c026b31ac89b196521f997f941b4.png
              - img
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/d9158aea4d437cd796f307006225d3a9.png
              - img
          - paragraph [ref=e600]: 并且提供了便捷的数据查询功能：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/a90b11bda73eadb293aef4a990ccdb3d.png
              - img
          - paragraph [ref=e601]: 除了这些基本功能外，KSQL Developer 还支持视图、索引、存储过程等多种数据库对象的管理：
          - paragraph:
            - link:
              - /url: /csdn-blog/csdn-blog/images/789db0d575ed76f2504016f9402bee9d.png
              - img
          - paragraph [ref=e602]: 基本上覆盖了我们日常运维中的所有需求。
          - heading " 写在最后" [level=2] [ref=e603]:
            - link "" [ref=e604] [cursor=pointer]:
              - /url: "#写在最后"
            - text: 写在最后
          - paragraph [ref=e605]: 经过实际使用，我认为 KSQL Developer 确实是一款值得推荐的数据库管理工具。它不仅在连接金仓数据库时表现出色，在对其他异构数据库的支持方面也做得相当不错。直观的图形化界面降低了数据库管理的技术门槛，智能化的开发功能则提高了专业 DBA 的工作效率。
          - paragraph [ref=e606]: 在当前国产化替代的大背景下，拥有这样一款既支持国产数据库又能管理传统数据库的工具，对我们 DBA 来说确实很有价值。它帮助我们更好地应对多类型数据库并存的运维环境，是一款实用且高效的数据库管理工具。
