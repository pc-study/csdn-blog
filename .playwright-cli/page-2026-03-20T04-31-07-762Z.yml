                  - cell "-- 即使用户没有权限，也能查询到表的存在 mysql> SELECT table_name FROM information_schema.tables WHERE table_schema = 'mydb'; +------------+ | table_name | +------------+ | orders | | customers | | salaries | -- 工资表，敏感！ +------------+" [ref=e882]:
                    - generic [ref=e883]:
                      - generic [ref=e884]: "-- 即使用户没有权限，也能查询到表的存在"
                      - generic [ref=e885]: mysql> SELECT table_name FROM information_schema.tables
                      - generic [ref=e886]: WHERE table_schema = 'mydb';
                      - generic [ref=e887]: +------------+
                      - generic [ref=e888]: "| table_name |"
                      - generic [ref=e889]: +------------+
                      - text: "| orders |"
                      - text: "| customers |"
                      - generic [ref=e890]: "| salaries | -- 工资表，敏感！"
                      - generic [ref=e891]: +------------+
          - paragraph [ref=e894]: 这是 MySQL 的默认设计，不是 BUG，但确实是安全隐患。从 MySQL 5.x 版本到 MySQL 8.0+ 版本都有相关的改进：
          - table [ref=e896]:
            - rowgroup [ref=e897]:
              - row "版本 行为" [ref=e898]:
                - columnheader "版本" [ref=e899]
                - columnheader "行为" [ref=e900]
            - rowgroup [ref=e901]:
              - row "MySQL 5.x 所有用户可查看所有数据库的表结构" [ref=e902]:
                - cell "MySQL 5.x" [ref=e903]
                - cell "所有用户可查看所有数据库的表结构" [ref=e904]
              - row "MySQL 8.0+ 引入部分隔离，但仍可探测表存在性" [ref=e905]:
                - cell "MySQL 8.0+" [ref=e906]
                - cell "引入部分隔离，但仍可探测表存在性" [ref=e907]
          - paragraph [ref=e908]:
            - strong [ref=e909]: 但注意
            - text: ：即使 MySQL 8.0，默认仍可通过
            - code [ref=e910]: SHOW TABLES
            - text: 或
            - strong [ref=e911]: information_schema
            - text: 查看未授权表的名称。
          - heading " 金仓数据库" [level=2] [ref=e912]:
            - link "" [ref=e913] [cursor=pointer]:
