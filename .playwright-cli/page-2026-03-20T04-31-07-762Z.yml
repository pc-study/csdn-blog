          - heading " 安装 unixODBC" [level=3] [ref=e182]:
            - link "" [ref=e183] [cursor=pointer]:
              - /url: "#安装-unixODBC"
            - text: 安装 unixODBC
          - paragraph [ref=e184]: 透明网关本身在 Oracle 里，但真正和外部数据库打交道，还是要靠系统层面的 ODBC。
