          - paragraph [ref=e1127]: 可以发现，金仓数据库通过插件方式实现了开关式的一键开关用户权限隔离功能，十分方便快捷。
          - paragraph [ref=e1128]:
            - text: 金仓数据库的这个功能，技术底层实现依赖
            - strong [ref=e1129]: 行级安全策略
            - text: （Row-Level Security, RLS），通过修改数据库状态，为当前数据库
            - strong [ref=e1130]: 具有 ACL 字段的系统表统一添加配置好的 RLS
            - text: ，通过 RLS 筛选以实现普通用户只能查看有权访问的对象（表、函数、视图、字段等）的目的。
          - heading " 写在最后" [level=2] [ref=e1131]:
            - link "" [ref=e1132] [cursor=pointer]:
              - /url: "#写在最后"
            - text: 写在最后
          - paragraph [ref=e1133]:
            - text: 在数字化时代，数据安全至关重要，数据库权限管理是核心保障。金仓数据库通过
            - code [ref=e1134]: security_utils
            - text: 插件提供了超越 MySQL 原生能力的安全特性，补齐了 Oracle 级别的安全特性，通过插件化实现，兼顾灵活性和安全性。
          - paragraph [ref=e1135]: 同时，金仓数据库高度兼容 MySQL 的语法与基本功能，降低应用迁移成本，还在权限管理上实现功能增强，能满足金融、医疗等领域复杂需求，为企业数字化转型提供可靠数据安全支撑。
