    - main [ref=e62]:
      - generic [ref=e63]:
        - generic [ref=e64]:
          - heading "【金仓数据库产品体验官】KSQL Developer：一款值得推荐的数据库管理工具" [level=1] [ref=e65]:
            - text: 【金仓数据库产品体验官】KSQL Developer：一款值得推荐的数据库管理工具
            - link "编辑" [ref=e66] [cursor=pointer]:
              - /url: https://github.com/pc-study/csdn-blog/edit/main/source/_posts/_posts/2025-11-28-155349073.md
          - generic [ref=e68]:
            - generic [ref=e69]:
              - generic [ref=e70]:
                - text: 发表于
                - time [ref=e72]: 2025-11-28
                - text: "|"
                - text: 更新于
                - time [ref=e74]: 2026-03-20
              - generic [ref=e75]:
                - text: "|"
                - link "数据库" [ref=e77] [cursor=pointer]:
                  - /url: /csdn-blog/categories/%E6%95%B0%E6%8D%AE%E5%BA%93/
            - generic [ref=e78]:
              - generic [ref=e79]:
                - text: 总字数:1.3k|
                - text: 阅读时长:3分钟
              - text: "|"
              - generic [ref=e82]: 浏览量:1
        - article [ref=e84]:
          - text: 
          - heading " 前言 前言" [level=2] [ref=e85]:
            - text: 
            - link "前言" [ref=e86] [cursor=pointer]:
              - /url: "#前言"
            - text: 前言
          - paragraph [ref=e87]: 作为一名长期奋战在一线的 DBA，我深知数据库运维工作的复杂性与挑战性。随着国产数据库的快速发展，我们在享受技术自主可控带来的安全感的同时，也面临着多款数据库并存的运维压力。不同的数据库产品意味着需要掌握不同的管理工具，这无疑增加了我们的工作负担。
          - paragraph [ref=e88]: 最近，我在实际工作中接触到了金仓的 KSQL Developer 数据库管理工具，经过一段时间的使用，确实感受到了它的实用价值，今天就想和大家分享这款工具的使用体验。
          - heading " 安装 KSQL Developer 安装 KSQL Developer" [level=2] [ref=e89]:
            - text: 
            - link "安装 KSQL Developer" [ref=e90] [cursor=pointer]:
              - /url: "#安装-KSQL-Developer"
            - text: 安装 KSQL Developer
          - paragraph [ref=e91]: KSQL Developer 的安装过程十分友好，真正做到了”一键安装”。只需要解压安装包，双击运行 setup.bat 文件，然后按照安装向导的提示一步步操作即可。
          - paragraph [ref=e92]:
            - text: 解压后，双击运行
            - code [ref=e93]: setup.bat
            - text: 开始安装：
          - paragraph [ref=e94]:
            - link [ref=e95] [cursor=pointer]:
              - /url: /csdn-blog/images/f8d31bc3e34f228ed8f713ae39af4c89.png
              - img [ref=e96]
          - paragraph [ref=e97]:
            - link [ref=e98] [cursor=pointer]:
              - /url: /csdn-blog/images/658df128dbd2c1f6b269ce947a67eada.png
              - img [ref=e99]
          - paragraph [ref=e100]:
            - link [ref=e101] [cursor=pointer]:
              - /url: /csdn-blog/images/c0bccfe0571469f2a6f16d9b38796750.png
              - img [ref=e102]
          - paragraph [ref=e103]:
            - link [ref=e104] [cursor=pointer]:
              - /url: /csdn-blog/images/c4404b3d75c4bfc397472be465b5a4cc.png
              - img [ref=e105]
          - paragraph [ref=e106]:
            - link [ref=e107] [cursor=pointer]:
              - /url: /csdn-blog/images/7e1dd37796161dd7f91f1f158a07dcc2.png
              - img [ref=e108]
          - paragraph [ref=e109]:
            - link [ref=e110] [cursor=pointer]:
              - /url: /csdn-blog/images/abcac01cfc274e268d40080f3102287e.png
              - img [ref=e111]
          - paragraph [ref=e112]:
            - link [ref=e113] [cursor=pointer]:
              - /url: /csdn-blog/images/49835ff6c4095a9b603166945bb0d613.png
              - img [ref=e114]
          - paragraph [ref=e115]:
            - link [ref=e116] [cursor=pointer]:
              - /url: /csdn-blog/images/f89f27be0165edccae3d2dcbde30429e.png
              - img [ref=e117]
          - paragraph [ref=e118]: 整个安装过程清晰直观，没有复杂的配置选项，从启动安装程序到完成安装，只需要连续点击”下一步”按钮，几分钟内就能完成所有安装步骤。这种简洁的安装体验对于我们 DBA 来说非常实用，特别是在需要快速部署工具的紧急情况下。
          - heading " 异构数据库支持 异构数据库支持" [level=2] [ref=e119]:
            - text: 
            - link "异构数据库支持" [ref=e120] [cursor=pointer]:
              - /url: "#异构数据库支持"
            - text: 异构数据库支持
          - paragraph [ref=e121]: 在实际的运维环境中，我们往往需要同时管理多种类型的数据库。KSQL Developer 在这方面表现突出，它提供了对多种主流数据库的全面支持。
          - heading " Kingbase Kingbase" [level=3] [ref=e122]:
            - text: 
            - link "Kingbase" [ref=e123] [cursor=pointer]:
              - /url: "#Kingbase"
            - text: Kingbase
          - paragraph [ref=e124]: 对金仓数据库的自然支持当然不在话下，连接配置简单直观：
          - paragraph [ref=e125]:
            - link [ref=e126] [cursor=pointer]:
              - /url: /csdn-blog/images/cd0004f9869eb94b4d2e9e44937ec2b5.png
              - img [ref=e127]
          - paragraph [ref=e128]: 只需要输入正确的主机 IP、端口号、用户名和密码，就能快速建立连接：
          - paragraph [ref=e129]:
            - link [ref=e130] [cursor=pointer]:
              - /url: /csdn-blog/images/140743b55c34a1be3c0a28ddddbf2939.png
              - img [ref=e131]
          - paragraph [ref=e132]: 测试连接功能让我们在正式使用前能够验证配置的正确性，避免了因配置错误导致的连接问题：
          - paragraph [ref=e133]:
            - link [ref=e134] [cursor=pointer]:
              - /url: /csdn-blog/images/fb39a58c7fd1aaf7679c83e21e93b6bb.png
              - img [ref=e135]
          - paragraph [ref=e136]:
            - link [ref=e137] [cursor=pointer]:
              - /url: /csdn-blog/images/7c2e4084310f80b7f88ab3c12b54a193.png
              - img [ref=e138]
          - heading " Oracle Oracle" [level=3] [ref=e139]:
            - text: 
            - link "Oracle" [ref=e140] [cursor=pointer]:
              - /url: "#Oracle"
            - text: Oracle
          - paragraph [ref=e141]: 对 Oracle 数据库的支持同样令人满意。在连接 Oracle 数据库时，KSQL Developer 提供了专门的配置选项，连接过程流畅，没有出现兼容性问题。
          - paragraph [ref=e142]:
            - link [ref=e143] [cursor=pointer]:
              - /url: /csdn-blog/images/1c396cc7566a10478fb6ac0fd817f46d.png
              - img [ref=e144]
          - paragraph [ref=e145]:
            - link [ref=e146] [cursor=pointer]:
              - /url: /csdn-blog/images/61b5988aaf7ebb105d91c1fb26491a1f.png
              - img [ref=e147]
          - paragraph [ref=e148]:
            - link [ref=e149] [cursor=pointer]:
              - /url: /csdn-blog/images/c29f8dd13a9e09502757679ed26c519d.png
              - img [ref=e150]
          - paragraph [ref=e151]: 这对于需要同时管理金仓和 Oracle 数据库的 DBA 来说，确实提高了工作效率。
          - heading " MySQL MySQL" [level=3] [ref=e152]:
            - text: 
            - link "MySQL" [ref=e153] [cursor=pointer]:
              - /url: "#MySQL"
            - text: MySQL
          - paragraph [ref=e154]: 连接 MySQL 数据库时可能会遇到一个小问题——由于 MySQL 默认关闭公钥检索功能，需要在驱动设置的连接属性中手动添加 allowPublicKeyRetrieval=true 参数。
          - paragraph [ref=e155]:
            - link [ref=e156] [cursor=pointer]:
              - /url: /csdn-blog/images/6dce3f57f390ba2a95ec3709ff64b9f5.png
              - img [ref=e157]
          - paragraph [ref=e158]:
            - text: 这里遇到个问题，需要设置一下（
            - strong [ref=e159]: 因为允许公钥检索是默认关闭的，需要将它开启
            - text: ）：
          - paragraph [ref=e160]:
            - link [ref=e161] [cursor=pointer]:
              - /url: /csdn-blog/images/ff7fd09eb48857c072abfaaa4c07a098.png
              - img [ref=e162]
          - paragraph [ref=e163]:
            - text: 在驱动设置 –> 连接属性设置，手动添加一个用户属性
            - code [ref=e164]: allowPublicKeyRetrieval=true
            - text: ：
          - paragraph [ref=e165]:
            - link [ref=e166] [cursor=pointer]:
              - /url: /csdn-blog/images/e9c373d2f550b19e306e1eb3255ba516.png
              - img [ref=e167]
          - paragraph [ref=e168]: 再次测试连接即可：
          - paragraph [ref=e169]:
            - link [ref=e170] [cursor=pointer]:
              - /url: /csdn-blog/images/1acd4bf0230831561755294406018536.png
              - img [ref=e171]
          - paragraph [ref=e172]:
            - link [ref=e173] [cursor=pointer]:
              - /url: /csdn-blog/images/fa952dd208252d65635f1c3d559ce8a6.png
              - img [ref=e174]
          - paragraph [ref=e175]: 这个问题的解决方案很直观，在工具界面中很容易找到相应的设置位置。一旦完成这个简单的配置，连接 MySQL 数据库就变得十分顺畅。
          - paragraph [ref=e176]: 这种对多种数据库的良好支持，使得我们可以在一个统一的界面中管理不同类型的数据库，大大减少了在不同管理工具之间切换的时间成本。
          - heading " 对象图形化管理 对象图形化管理" [level=2] [ref=e177]:
            - text: 
            - link "对象图形化管理" [ref=e178] [cursor=pointer]:
              - /url: "#对象图形化管理"
            - text: 对象图形化管理
          - paragraph [ref=e179]: 即使是对 SQL 语法不太熟悉的初级 DBA，也能通过 KSQL Developer 的图形化界面轻松完成各种数据库对象的管理工作。
          - heading " 新建库 新建库" [level=3] [ref=e180]:
            - text: 
            - link "新建库" [ref=e181] [cursor=pointer]:
              - /url: "#新建库"
            - text: 新建库
          - paragraph [ref=e182]: 创建数据库的过程完全可视化，通过填写数据库的基本参数就能快速完成，无需记忆复杂的 SQL 语句。
          - paragraph [ref=e183]:
            - link [ref=e184] [cursor=pointer]:
              - /url: /csdn-blog/images/ec1d56b880ee1a369f34afd6cf3730d3.png
              - img [ref=e185]
          - paragraph [ref=e186]:
            - link [ref=e187] [cursor=pointer]:
              - /url: /csdn-blog/images/635afd37a91218b10c128fe118a91ccb.png
              - img [ref=e188]
          - heading " 新建模式 新建模式" [level=3] [ref=e189]:
            - text: 
            - link "新建模式" [ref=e190] [cursor=pointer]:
              - /url: "#新建模式"
            - text: 新建模式
          - paragraph [ref=e191]: 模式管理同样简单，图形化界面让我们能够直观地设置模式的各项属性。
          - paragraph [ref=e192]:
            - link [ref=e193] [cursor=pointer]:
              - /url: /csdn-blog/images/3e08648e880037850d8d2a4d6c7ec667.png
              - img [ref=e194]
          - paragraph [ref=e195]:
            - link [ref=e196] [cursor=pointer]:
              - /url: /csdn-blog/images/9d0bd48e33281ad808a8e35b03b06583.png
              - img [ref=e197]
          - paragraph [ref=e198]: 特别值得一提的是，工具还提供了 DDL 语句预览功能，这对于学习 SQL 语法或者验证操作的正确性都有很大帮助：
          - paragraph [ref=e199]:
            - link [ref=e200] [cursor=pointer]:
              - /url: /csdn-blog/images/3a024dd8c493ae7d564b005b10f27a31.png
              - img [ref=e201]
          - paragraph [ref=e202]:
            - link [ref=e203] [cursor=pointer]:
              - /url: /csdn-blog/images/3e4f767e7ea245bca190f262acd3ec49.png
              - img [ref=e204]
          - heading " 建表 建表" [level=3] [ref=e205]:
            - text: 
            - link "建表" [ref=e206] [cursor=pointer]:
              - /url: "#建表"
            - text: 建表
          - paragraph [ref=e207]: 数据表管理功能十分完善，从创建表结构到编辑表数据，都能通过直观的界面操作完成。
          - paragraph [ref=e208]:
            - link [ref=e209] [cursor=pointer]:
              - /url: /csdn-blog/images/6d6d9883d1250a812e11f51aa0a21ce8.png
              - img [ref=e210]
          - paragraph [ref=e211]:
            - link [ref=e212] [cursor=pointer]:
              - /url: /csdn-blog/images/a2060ca0a5b35c050fd5eb9921fbcf0c.png
              - img [ref=e213]
          - paragraph [ref=e214]: 在表格数据编辑方面，工具提供了类似 Excel 的编辑体验，支持直接在中修改数据：
          - paragraph [ref=e215]:
            - link [ref=e216] [cursor=pointer]:
              - /url: /csdn-blog/images/f03167df971669d1b0849a62135657ee.png
              - img [ref=e217]
          - paragraph [ref=e218]:
            - link [ref=e219] [cursor=pointer]:
              - /url: /csdn-blog/images/0156c026b31ac89b196521f997f941b4.png
              - img [ref=e220]
          - paragraph [ref=e221]:
            - link [ref=e222] [cursor=pointer]:
              - /url: /csdn-blog/images/d9158aea4d437cd796f307006225d3a9.png
              - img [ref=e223]
          - paragraph [ref=e224]: 并且提供了便捷的数据查询功能：
          - paragraph [ref=e225]:
            - link [ref=e226] [cursor=pointer]:
              - /url: /csdn-blog/images/a90b11bda73eadb293aef4a990ccdb3d.png
              - img [ref=e227]
          - paragraph [ref=e228]: 除了这些基本功能外，KSQL Developer 还支持视图、索引、存储过程等多种数据库对象的管理：
          - paragraph [ref=e229]:
            - link [ref=e230] [cursor=pointer]:
              - /url: /csdn-blog/images/789db0d575ed76f2504016f9402bee9d.png
              - img [ref=e231]
          - paragraph [ref=e232]: 基本上覆盖了我们日常运维中的所有需求。
          - heading " 写在最后 写在最后" [level=2] [ref=e233]:
            - text: 
            - link "写在最后" [ref=e234] [cursor=pointer]:
              - /url: "#写在最后"
            - text: 写在最后
          - paragraph [ref=e235]: 经过实际使用，我认为 KSQL Developer 确实是一款值得推荐的数据库管理工具。它不仅在连接金仓数据库时表现出色，在对其他异构数据库的支持方面也做得相当不错。直观的图形化界面降低了数据库管理的技术门槛，智能化的开发功能则提高了专业 DBA 的工作效率。
          - paragraph [ref=e236]: 在当前国产化替代的大背景下，拥有这样一款既支持国产数据库又能管理传统数据库的工具，对我们 DBA 来说确实很有价值。它帮助我们更好地应对多类型数据库并存的运维环境，是一款实用且高效的数据库管理工具。
