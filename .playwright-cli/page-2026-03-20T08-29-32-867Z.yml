          - heading " 前言 前言" [level=2] [ref=e553]:
            - text: 
            - link "前言" [ref=e554] [cursor=pointer]:
              - /url: "#前言"
            - text: 前言
          - paragraph [ref=e555]:
            - text: 今天业务抛了个问题过来：
            - strong [ref=e556]: Oracle 能不能直接查 TiDB？
          - paragraph [ref=e557]:
            - text: 第一反应是“这俩不是一套体系”，但转念一想，TiDB 在协议层面兼容 MySQL，而 Oracle 早就可以通过
            - strong [ref=e558]: 透明网关 + ODBC + DBLink
            - text: 访问 MySQL，那 TiDB 理论上也走得通。
          - paragraph [ref=e559]:
            - text: 实际动手验证了一下，结论很明确：
            - strong [ref=e560]: 确实可以
            - text: 。不需要做数据同步，不用引入中间服务，也不必改应用代码，
            - strong [ref=e561]: 只要在 Oracle 里建一个 DBLink
            - text: ，就能直接查询 TiDB 表。
          - paragraph [ref=e562]: 本文记录的就是这次完整的落地过程。
          - heading " 环境信息 环境信息" [level=2] [ref=e563]:
            - text: 
            - link "环境信息" [ref=e564] [cursor=pointer]:
              - /url: "#环境信息"
            - text: 环境信息
          - paragraph [ref=e565]: 环境本身并不复杂，两端都是 CentOS 7.9，数据库版本也都算主流：
          - table [ref=e567]:
            - rowgroup [ref=e568]:
              - row "角色 系统 数据库类型 数据库版本" [ref=e569]:
                - columnheader "角色" [ref=e570]
                - columnheader "系统" [ref=e571]
                - columnheader "数据库类型" [ref=e572]
                - columnheader "数据库版本" [ref=e573]
            - rowgroup [ref=e574]:
              - row "源端 Centos7.9 Oracle 19c" [ref=e575]:
                - cell "源端" [ref=e576]
                - cell "Centos7.9" [ref=e577]
                - cell "Oracle" [ref=e578]
                - cell "19c" [ref=e579]
              - row "目标端 Centos7.9 TiDB v7.5.0" [ref=e580]:
                - cell "目标端" [ref=e581]
                - cell "Centos7.9" [ref=e582]
                - cell "TiDB" [ref=e583]
                - cell "v7.5.0" [ref=e584]
          - heading " Oracle 端配置 Oracle 端配置" [level=2] [ref=e585]:
            - text: 
            - link "Oracle 端配置" [ref=e586] [cursor=pointer]:
              - /url: "#Oracle-端配置"
            - text: Oracle 端配置
          - heading " 透明网关检查 透明网关检查" [level=3] [ref=e587]:
            - text: 
            - link "透明网关检查" [ref=e588] [cursor=pointer]:
              - /url: "#透明网关检查"
            - text: 透明网关检查
          - paragraph [ref=e589]: Oracle 19c 其实已经把 ODBC 透明网关准备好了，不需要再额外装什么组件。先简单确认一下：
          - figure [ref=e590]:
            - generic [ref=e597]: elixir
            - table [ref=e600]:
              - rowgroup [ref=e601]:
                - row "1 2 3 4 5 6 7 [oracle@orcl:/home/oracle]$ cd $ORACLE_HOME/hs [oracle@orcl:/u01/app/oracle/product/19.3.0/db/hs]$ dg4odbc Oracle Corporation --- 2026-01-20 16:11:29.887228000 Heterogeneous Agent Release 19.0.0.0.0 - Production Built with Oracle Database Gateway for ODBC" [ref=e602]:
                  - cell "1 2 3 4 5 6 7" [ref=e603]:
                    - generic [ref=e604]:
                      - text: "1"
                      - text: "2"
                      - text: "3"
                      - text: "4"
                      - text: "5"
                      - text: "6"
                      - text: "7"
                  - cell "[oracle@orcl:/home/oracle]$ cd $ORACLE_HOME/hs [oracle@orcl:/u01/app/oracle/product/19.3.0/db/hs]$ dg4odbc Oracle Corporation --- 2026-01-20 16:11:29.887228000 Heterogeneous Agent Release 19.0.0.0.0 - Production Built with Oracle Database Gateway for ODBC" [ref=e605]:
                    - code [ref=e607]:
                      - text: "[oracle@orcl:/home/oracle]$ cd $ORACLE_HOME/hs"
                      - text: "[oracle@orcl:/u01/app/oracle/product/19.3.0/db/hs]$ dg4odbc"
                      - text: Oracle Corporation --- 2026-01-20 16:11:29.887228000
                      - text: Heterogeneous Agent Release 19.0.0.0.0 - Production Built with
                      - text: Oracle Database Gateway for ODBC
          - paragraph [ref=e608]: 看到 Oracle Database Gateway for ODBC，说明没有问题。
          - heading " 安装 unixODBC 安装 unixODBC" [level=3] [ref=e609]:
            - text: 
            - link "安装 unixODBC" [ref=e610] [cursor=pointer]:
              - /url: "#安装-unixODBC"
            - text: 安装 unixODBC
          - paragraph [ref=e611]: 透明网关本身在 Oracle 里，但真正和外部数据库打交道，还是要靠系统层面的 ODBC。
          - paragraph [ref=e612]: CentOS 7 上直接用本地 YUM 源安装即可：
          - figure [ref=e613]:
            - generic [ref=e620]: elixir
            - table [ref=e623]:
              - rowgroup [ref=e624]:
                - row "1 [root@orcl:/root]# yum install -y unixODBC*" [ref=e625]:
                  - cell "1" [ref=e626]:
                    - generic [ref=e627]: "1"
                  - cell "[root@orcl:/root]# yum install -y unixODBC*" [ref=e628]:
                    - code [ref=e630]: "[root@orcl:/root]# yum install -y unixODBC*"
          - paragraph [ref=e631]: 装完之后，确认一下环境是否正常：
          - figure [ref=e632]:
            - generic [ref=e639]: ruby
            - table [ref=e642]:
              - rowgroup [ref=e643]:
                - 'row "1 2 3 4 5 6 [root@orcl:/root]# odbcinst -j unixODBC 2.3.1 DRIVERS............: /etc/odbcinst.ini SYSTEM DATA SOURCES: /etc/odbc.ini FILE DATA SOURCES..: /etc/ODBCDataSources USER DATA SOURCES..: /root/.odbc.ini" [ref=e644]':
                  - cell "1 2 3 4 5 6" [ref=e645]:
                    - generic [ref=e646]:
                      - text: "1"
                      - text: "2"
                      - text: "3"
                      - text: "4"
                      - text: "5"
                      - text: "6"
                  - 'cell "[root@orcl:/root]# odbcinst -j unixODBC 2.3.1 DRIVERS............: /etc/odbcinst.ini SYSTEM DATA SOURCES: /etc/odbc.ini FILE DATA SOURCES..: /etc/ODBCDataSources USER DATA SOURCES..: /root/.odbc.ini" [ref=e647]':
                    - code [ref=e649]:
                      - text: "[root@orcl:/root]# odbcinst -j"
                      - text: unixODBC 2.3.1
                      - text: "DRIVERS............: /etc/odbcinst.ini"
                      - text: "SYSTEM DATA SOURCES: /etc/odbc.ini"
                      - text: "FILE DATA SOURCES..: /etc/ODBCDataSources"
                      - text: "USER DATA SOURCES..: /root/.odbc.ini"
          - paragraph [ref=e650]: 这一步很关键，如果 ODBC 本身不干净，后面 Oracle 报错会非常“玄学”。
          - heading " 安装 MySQL ODBC 驱动 安装 MySQL ODBC 驱动" [level=3] [ref=e651]:
            - text: 
            - link "安装 MySQL ODBC 驱动" [ref=e652] [cursor=pointer]:
              - /url: "#安装-MySQL-ODBC-驱动"
            - text: 安装 MySQL ODBC 驱动
          - paragraph [ref=e653]: TiDB 在客户端看来就是 MySQL，这里直接使用 MySQL Connector/ODBC。
          - paragraph [ref=e654]:
            - text: 驱动从官方归档页下载即可：
            - link "https://downloads.mysql.com/archives/c-odbc/" [ref=e655] [cursor=pointer]:
              - /url: https://downloads.mysql.com/archives/c-odbc/
          - paragraph [ref=e656]:
            - link [ref=e657] [cursor=pointer]:
              - /url: /csdn-blog/images/619f5daa22e83e88de9459139a7b0071.png
              - img [ref=e658]
          - paragraph [ref=e659]: 安装过程很简单：
          - figure [ref=e660]:
            - generic [ref=e667]: elixir
            - table [ref=e670]:
              - rowgroup [ref=e671]:
                - row "1 [root@orcl:/root]# rpm -ivh mysql-connector-odbc-8.0.27-1.el7.x86_64.rpm" [ref=e672]:
                  - cell "1" [ref=e673]:
                    - generic [ref=e674]: "1"
                  - cell "[root@orcl:/root]# rpm -ivh mysql-connector-odbc-8.0.27-1.el7.x86_64.rpm" [ref=e675]:
                    - code [ref=e677]: "[root@orcl:/root]# rpm -ivh mysql-connector-odbc-8.0.27-1.el7.x86_64.rpm"
          - heading " 配置 ODBC 数据源 配置 ODBC 数据源" [level=3] [ref=e678]:
            - text: 
            - link "配置 ODBC 数据源" [ref=e679] [cursor=pointer]:
              - /url: "#配置-ODBC-数据源"
            - text: 配置 ODBC 数据源
          - paragraph [ref=e680]:
            - text: 这里我直接在
