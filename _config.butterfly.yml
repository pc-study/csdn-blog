# --------------------------------------
# Hexo Butterfly Theme Configuration
# Blog: Lucifer三思而后行
# --------------------------------------

# --------------------------------------
# Navigation Settings
# --------------------------------------

nav:
  logo:
  display_title: true
  display_post_title: true
  fixed: true

menu:
  首页: / || fas fa-home
  时间轴: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-th
  关于: /about/ || fas fa-user
  CSDN: https://luciferliu.blog.csdn.net/ || fas fa-external-link-alt

# --------------------------------------
# Code Blocks Settings
# --------------------------------------

code_blocks:
  theme: darker
  macStyle: true
  height_limit: 500
  word_wrap: false
  copy: true
  language: true
  shrink: false
  fullpage: true

# Social media links
social:
  fab fa-github: https://github.com/pc-study || Github || '#24292e'
  fas fa-blog: https://luciferliu.blog.csdn.net/ || CSDN || '#fc5531'

# --------------------------------------
# Image Settings
# --------------------------------------

favicon: /img/favicon.svg

avatar:
  img: /img/avatar.jpg
  effect: true

disable_top_img: true
default_top_img:
index_img:
archive_img:
tag_img:
category_img:

footer_img: false

background:

cover:
  index_enable: true
  aside_enable: true
  archives_enable: true
  default_cover:
    - /img/covers/oracle.svg
    - /img/covers/database.svg
    - /img/covers/linux.svg
    - /img/covers/tech.svg
    - /img/covers/bigdata.svg
    - /img/covers/default.svg

error_img:
  flink: /img/friend_404.gif
  post_page: /img/404.jpg

error_404:
  enable: true
  subtitle: '页面不存在'
  background:

post_meta:
  page:
    date_type: created
    date_format: date
    categories: true
    tags: true
    label: true
  post:
    position: left
    date_type: both
    date_format: date
    categories: true
    tags: true
    label: true

# --------------------------------------
# Index page settings
# --------------------------------------

index_site_info_top:
index_top_img_height:

subtitle:
  enable: true
  effect: true
  typed_option:
    typeSpeed: 50
    backSpeed: 30
    loop: true
  source: false
  sub:
    - "Oracle · 数据库 · Linux · 运维"
    - "528 篇原创技术文章"
    - "三思而后行，知行合一"

index_layout: 3

index_post_content:
  method: 2
  length: 300

# --------------------------------------
# Post Settings
# --------------------------------------

toc:
  post: true
  page: false
  number: true
  expand: false
  style_simple: false
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: https://luciferliu.blog.csdn.net/
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

reward:
  enable: false

post_edit:
  enable: true
  url: https://github.com/pc-study/csdn-blog/edit/main/source/_posts/

related_post:
  enable: true
  limit: 6
  date_type: created

post_pagination: 1

noticeOutdate:
  enable: true
  style: flat
  limit_day: 365
  position: top
  message_prev: 本文最后更新于
  message_next: 天前，内容可能已过时。

# --------------------------------------
# Footer Settings
# --------------------------------------
footer:
  nav:
  owner:
    enable: true
    since: 2021
  copyright:
    enable: true
    version: false
  custom_text: "Lucifer三思而后行 | CSDN 博客备份站"

# --------------------------------------
# Aside Settings
# --------------------------------------

aside:
  enable: true
  hide: false
  button: true
  mobile: true
  position: right
  display:
    archive: true
    tag: true
    category: true
  card_author:
    enable: true
    description: "Oracle DBA | 数据库技术博主"
    button:
      enable: true
      icon: fas fa-blog
      text: 访问 CSDN
      link: https://luciferliu.blog.csdn.net/
  card_announcement:
    enable: true
    content: "欢迎来到 Lucifer 的博客归档站！本站收录了 528 篇原创技术文章。"
  card_recent_post:
    enable: true
    limit: 5
    sort: date
    sort_order:
  card_newest_comments:
    enable: false
  card_categories:
    enable: true
    limit: 8
    expand: none
    sort_order:
  card_tags:
    enable: true
    limit: 30
    color: true
    custom_colors:
    orderby: random
    order: 1
    sort_order:
  card_archives:
    enable: true
    type: monthly
    format: YYYY年MM月
    order: -1
    limit: 8
    sort_order:
  card_post_series:
    enable: false
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true
    sort_order:
    runtime_date: 05/07/2021

# --------------------------------------
# Bottom right button
# --------------------------------------

rightside_bottom:

translate:
  enable: false

readmode: true

darkmode:
  enable: true
  button: true
  autoChangeMode: 1

rightside_scroll_percent: true

rightside_item_order:
  enable: false

rightside_config_animation: true

# --------------------------------------
# Global Settings
# --------------------------------------

anchor:
  auto_update: true
  click_to_scroll: true

photofigcaption: false

copy:
  enable: true
  copyright:
    enable: true
    limit_count: 150

wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

busuanzi:
  site_uv: true
  site_pv: true
  page_pv: true

# --------------------------------------
# Search
# --------------------------------------

search:
  use: local_search
  placeholder: 搜索文章...

  local_search:
    preload: true
    top_n_per_article: 3
    unescape: true
    CDN:

# --------------------------------------
# Share System
# --------------------------------------

share:
  use:

# --------------------------------------
# Comments System
# --------------------------------------

comments:
  use:
  text: true
  lazyload: true

# --------------------------------------
# Beautify / Effect
# --------------------------------------

theme_color:
  enable: true
  main: "#1a73e8"
  paginator: "#1a73e8"
  button_hover: "#4a9ff5"
  text_selection: "#1a73e8"
  link_color: "#1a73e8"
  meta_color: "#858585"
  hr_color: "#A4D8FA"
  code_foreground: "#e06c75"
  code_background: "rgba(27, 31, 35, .05)"
  toc_color: "#1a73e8"
  blockquote_padding_color: "#1a73e8"
  blockquote_background_color: "#ecf5ff"
  scrollbar_color: "#1a73e8"
  meta_theme_color_light: "ffffff"
  meta_theme_color_dark: "#0d0d0d"

category_ui: index
tag_ui: index

rounded_corners_ui: true
text_align_justify: true

mask:
  header: true
  footer: true

preloader:
  enable: true
  source: 2
  pace_css_url:

enter_transitions: true

display_mode: light

beautify:
  enable: true
  field: post
  title_prefix_icon: '\f105'
  title_prefix_icon_color: '#1a73e8'

font:
  global_font_size: 16px
  code_font_size: 14px
  font_family: "'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
  code_font_family: "'JetBrains Mono', 'Fira Code', Consolas, monospace"

blog_title_font:
  font_link: https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap
  font_family: "'Noto Sans SC', sans-serif"

hr_icon:
  enable: true
  icon:
  icon_top:

# --------------------------------------
# Lightbox
# --------------------------------------

lightbox: fancybox

# --------------------------------------
# Other Settings
# --------------------------------------

pjax:
  enable: true
  exclude:

snackbar:
  enable: true
  position: bottom-left
  bg_light: '#1a73e8'
  bg_dark: '#1f1f1f'

instantpage: true

lazyload:
  enable: true
  native: false
  field: site
  placeholder:
  blur: true

Open_Graph_meta:
  enable: true

css_prefix: true

inject:
  head:
    - <link rel="preconnect" href="https://fonts.googleapis.com">
    - <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    - <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  bottom:

CDN:
  internal_provider: local
  third_party_provider: jsdelivr
  version: true
